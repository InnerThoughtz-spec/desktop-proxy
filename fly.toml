# fly.toml app configuration file generated for inneros on 2026-04-28T03:13:21Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'inneros'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = 'map[value:/data]'
  NODE_OPTIONS = '--max-old-space-size=200'
  PORT = '8080'

[[mounts]]
  source = 'wallpapers'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'get'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
